<!-- Chatbot Floating Widget -->
<div id="chatbot-widget">
    <div id="chatbot-button">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="28" height="28">
            <path d="M12 2C6.48 2 2 6.48 2 12c0 1.54.36 3 .97 4.29L2 22l5.71-.97C9 21.64 10.46 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18c-1.38 0-2.68-.31-3.85-.85l-.27-.14-2.83.48.48-2.83-.14-.27C4.31 14.68 4 13.38 4 12c0-4.41 3.59-8 8-8s8 3.59 8 8-3.59 8-8 8z"/>
            <circle cx="9" cy="12" r="1.5"/>
            <circle cx="15" cy="12" r="1.5"/>
        </svg>
    </div>
    
    <div id="chatbot-window" style="display: none;">
        <div id="chatbot-header">
            <div class="chatbot-title">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="20" height="20">
                    <path d="M12 2C6.48 2 2 6.48 2 12c0 1.54.36 3 .97 4.29L2 22l5.71-.97C9 21.64 10.46 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/>
                </svg>
                <span>Ask your Query</span>
            </div>
            <button id="chatbot-close">&times;</button>
        </div>
        
        <div id="chatbot-messages"></div>
        
        <div id="chatbot-input-area">
            <div id="chatbot-actions">
                <label for="file-upload" class="action-btn" title="Upload File">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                        <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zM6 20V4h7v5h5v11H6z"/>
                    </svg>
                </label>
                <input type="file" id="file-upload" style="display: none;" accept="*/*">
                
                <button id="camera-btn" class="action-btn" title="Take Photo">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                        <path d="M12 15c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3z"/>
                        <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
                    </svg>
                </button>
                
                <button id="mic-btn" class="action-btn" title="Voice Input">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
            </div>
            
            <div id="chatbot-input-wrapper">
                <input type="text" id="chatbot-input" placeholder="Type your message or click mic to speak...">
                <button id="chatbot-send">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="20" height="20">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>

<video id="camera-stream" style="display: none;"></video>
<canvas id="camera-canvas" style="display: none;"></canvas>

<style>
#chatbot-widget {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
}

#chatbot-button {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00aaff 0%, #0066cc 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(0, 170, 255, 0.4);
    transition: all 0.3s ease;
}

#chatbot-button:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(0, 170, 255, 0.6);
}

#chatbot-window {
    position: absolute;
    bottom: 80px;
    right: 0;
    width: 380px;
    height: 550px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

#chatbot-header {
    background: linear-gradient(135deg, #00aaff 0%, #0066cc 100%);
    color: white;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.chatbot-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 16px;
}

#chatbot-close {
    background: none;
    border: none;
    color: white;
    font-size: 28px;
    cursor: pointer;
    line-height: 1;
    padding: 0;
    width: 30px;
    height: 30px;
}

#chatbot-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    background: #f8f9fa;
}

.message {
    margin-bottom: 16px;
    display: flex;
    gap: 8px;
}

.message.user {
    flex-direction: row-reverse;
}

.message-content {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 16px;
    word-wrap: break-word;
}

.message.user .message-content {
    background: linear-gradient(135deg, #00aaff 0%, #0066cc 100%);
    color: white;
    border-bottom-right-radius: 4px;
}

.message.bot .message-content {
    background: white;
    color: #333;
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}

#chatbot-input-area {
    padding: 16px;
    background: white;
    border-top: 1px solid #e9ecef;
}

#chatbot-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
}

.action-btn {
    background: #f1f3f5;
    border: none;
    border-radius: 8px;
    padding: 8px 12px;
    cursor: pointer;
    color: #495057;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
}

.action-btn:hover {
    background: #e9ecef;
    color: #00aaff;
}

.action-btn.recording {
    background: #ff6b6b;
    color: white;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
}

#chatbot-input-wrapper {
    display: flex;
    gap: 8px;
}

#chatbot-input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid #e9ecef;
    border-radius: 24px;
    outline: none;
    font-size: 14px;
    transition: border-color 0.2s;
}

#chatbot-input:focus {
    border-color: #00aaff;
}

#chatbot-send {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00aaff 0%, #0066cc 100%);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

#chatbot-send:hover {
    transform: scale(1.05);
}

.typing-indicator {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
}

.typing-indicator span {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #adb5bd;
    animation: typing 1.4s infinite;
}

.typing-indicator span:nth-child(2) {
    animation-delay: 0.2s;
}

.typing-indicator span:nth-child(3) {
    animation-delay: 0.4s;
}

@keyframes typing {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-10px); }
}

@media (max-width: 480px) {
    #chatbot-window {
        width: calc(100vw - 40px);
        height: calc(100vh - 100px);
        bottom: 80px;
        right: 20px;
    }
}
</style>

<script>
(function() {
    const chatbotButton = document.getElementById('chatbot-button');
    const chatbotWindow = document.getElementById('chatbot-window');
    const chatbotClose = document.getElementById('chatbot-close');
    const chatbotInput = document.getElementById('chatbot-input');
    const chatbotSend = document.getElementById('chatbot-send');
    const chatbotMessages = document.getElementById('chatbot-messages');
    const fileUpload = document.getElementById('file-upload');
    const cameraBtn = document.getElementById('camera-btn');
    const micBtn = document.getElementById('mic-btn');
    
    let recognition = null;
    let isRecording = false;
    
    // Initialize Speech Recognition
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            chatbotInput.value = transcript;
            isRecording = false;
            micBtn.classList.remove('recording');
        };
        
        recognition.onerror = () => {
            isRecording = false;
            micBtn.classList.remove('recording');
        };
        
        recognition.onend = () => {
            isRecording = false;
            micBtn.classList.remove('recording');
        };
    }
    
    chatbotButton.addEventListener('click', () => {
        chatbotWindow.style.display = 'flex';
        chatbotButton.style.display = 'none';
        chatbotInput.focus();
    });
    
    chatbotClose.addEventListener('click', () => {
        chatbotWindow.style.display = 'none';
        chatbotButton.style.display = 'flex';
    });
    
    function addMessage(content, isUser = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
        messageDiv.innerHTML = `<div class="message-content">${content}</div>`;
        chatbotMessages.appendChild(messageDiv);
        chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
    }
    
    function showTyping() {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message bot';
        typingDiv.id = 'typing-indicator';
        typingDiv.innerHTML = '<div class="message-content typing-indicator"><span></span><span></span><span></span></div>';
        chatbotMessages.appendChild(typingDiv);
        chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
    }
    
    function hideTyping() {
        const typing = document.getElementById('typing-indicator');
        if (typing) typing.remove();
    }
    
    async function sendMessage(message, file = null, isImage = false) {
        if (!message && !file) return;
        
        if (message) addMessage(message, true);
        showTyping();
        
        try {
            let response;
            
            if (file) {
                const formData = new FormData();
                formData.append(isImage ? 'image' : 'file', file);
                formData.append('message', message || (isImage ? 'What is in this image?' : 'Analyze this file'));
                
                response = await fetch(`/api/chatbot/${isImage ? 'image' : 'file'}`, {
                    method: 'POST',
                    body: formData
                });
            } else {
                response = await fetch('/api/chatbot/message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
            }
            
            hideTyping();
            
            if (!response.ok) {
                const errorData = await response.json();
                addMessage(`❌ Error: ${errorData.error || 'Failed to get response'}`);
                return;
            }
            
            const data = await response.json();
            
            if (data.response) {
                addMessage(data.response);
                // Text-only response - NO voice/audio output
            } else if (data.error) {
                addMessage(`❌ Error: ${data.error}`);
            } else {
                addMessage('❌ Unexpected response format');
            }
        } catch (error) {
            hideTyping();
            console.error('Chatbot error:', error);
            addMessage('❌ Unable to connect to the chatbot service. Please check your internet connection and try again.');
        }
    }
    
    // Text-only chatbot - Voice output disabled
    // function speak(text) {
    //     if ('speechSynthesis' in window) {
    //         const utterance = new SpeechSynthesisUtterance(text);
    //         utterance.rate = 1;
    //         utterance.pitch = 1;
    //         speechSynthesis.speak(utterance);
    //     }
    // }
    
    chatbotSend.addEventListener('click', () => {
        const message = chatbotInput.value.trim();
        if (message) {
            sendMessage(message);
            chatbotInput.value = '';
        }
    });
    
    chatbotInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            chatbotSend.click();
        }
    });
    
    fileUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const isImage = file.type.startsWith('image/');
            addMessage(`📎 ${file.name}`, true);
            sendMessage('', file, isImage);
            fileUpload.value = '';
        }
    });
    
    cameraBtn.addEventListener('click', async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('camera-stream');
            const canvas = document.getElementById('camera-canvas');
            
            video.srcObject = stream;
            video.play();
            
            setTimeout(() => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                canvas.toBlob((blob) => {
                    const file = new File([blob], 'camera-capture.jpg', { type: 'image/jpeg' });
                    addMessage('📷 Camera capture', true);
                    sendMessage('', file, true);
                    
                    stream.getTracks().forEach(track => track.stop());
                });
            }, 100);
        } catch (error) {
            addMessage('Error: Unable to access camera.');
        }
    });
    
    micBtn.addEventListener('click', () => {
        if (!recognition) {
            addMessage('Error: Speech recognition not supported in this browser.');
            return;
        }
        
        if (isRecording) {
            recognition.stop();
        } else {
            isRecording = true;
            micBtn.classList.add('recording');
            recognition.start();
        }
    });
})();
</script>
